<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WildHermes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    .header {
      background: linear-gradient(rgba(10,20,40,0.85), rgba(10,20,40,0.95)),
                  url('tunturikuva.jpg') center/cover no-repeat;
      padding: 20px 5%;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      color: white;
      font-family: Arial, sans-serif;
    }

    .header-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo img {
      height: 60px;
    }

    .nav {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .nav a {
      color: white;
      text-decoration: none;
      font-size: 1.1rem;
    }

    .contact-btn {
      background: #D4AF37;
      color: #0A1428;
      padding: 12px 30px;
      border-radius: 50px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-container">
      <div class="logo">
        <img src="logo-wildhermes.png" alt="WildHermes">
      </div>
      
      <nav class="nav">
        <a href="#">Syntytarina</a>
        <a href="#">Palvelut</a>
        <a href="#">Kieli</a>
        <a href="#">Contact</a>
      </nav>
    </div>
  </header>

</body>
</html>
