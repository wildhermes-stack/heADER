<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WildHermes — Magic Header</title>
<style>
:root{--night:#040713;--deep:#081225;--gold:#f8d978;--gold2:#b36b1f;--cream:#fff2bd;--violet:#6b238d;--pink:#ff4fb4;--cyan:#77f7ff}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -10%,#243d67 0%,#081225 42%,#040713 100%);font-family:Arial,sans-serif;color:white;overflow-x:hidden}body:before{content:"";position:fixed;inset:0;background-image:radial-gradient(circle,rgba(255,229,145,.85) 0 1px,transparent 1.5px),radial-gradient(circle,rgba(119,247,255,.45) 0 1px,transparent 1.4px);background-size:130px 90px,210px 150px;opacity:.28;pointer-events:none;animation:stars 18s linear infinite}.header{position:fixed;top:0;left:0;width:100%;z-index:20;display:flex;justify-content:space-between;align-items:center;padding:18px clamp(16px,5vw,70px);background:linear-gradient(180deg,rgba(1,3,10,.84),rgba(1,3,10,.32));backdrop-filter:blur(18px);border-bottom:1px solid rgba(248,217,120,.2)}.logo{font-family:Georgia,serif;font-style:italic;font-size:clamp(27px,3vw,42px);color:var(--gold);font-weight:800;text-shadow:0 0 12px rgba(248,217,120,.8),0 0 36px rgba(255,79,180,.25)}.book-wrap{position:relative;display:inline-grid;place-items:center;text-decoration:none;isolation:isolate}.book-wrap:before{content:"";position:absolute;inset:-18px -28px;border-radius:34px;background:conic-gradient(from 0deg,transparent,var(--gold),var(--pink),var(--cyan),transparent);filter:blur(18px);opacity:.55;animation:orbit 4.5s linear infinite;transition:.3s;z-index:-3}.book-wrap:hover:before{opacity:1;filter:blur(24px)}.book-btn{position:relative;min-width:178px;height:58px;display:grid;place-items:center;padding:0 38px;border:2px solid rgba(255,226,137,.95);border-radius:20px;color:var(--cream);background:linear-gradient(180deg,rgba(20,24,42,.98),rgba(5,8,20,.98));box-shadow:inset 0 0 0 1px rgba(255,242,189,.28),inset 0 -12px 28px rgba(179,107,31,.18),0 0 18px rgba(248,217,120,.56),0 16px 44px rgba(0,0,0,.55);text-transform:uppercase;letter-spacing:.19em;font:800 17px Georgia,serif;text-shadow:0 0 12px rgba(255,242,189,.9);overflow:hidden;transition:.28s ease}.book-btn:before,.book-btn:after{content:"✦";position:absolute;top:50%;transform:translateY(-50%);font-size:22px;color:var(--gold);text-shadow:0 0 18px var(--gold)}.book-btn:before{left:13px}.book-btn:after{right:13px}.shine{position:absolute;inset:-80% auto -80% -65%;width:55%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.95),transparent);transform:rotate(24deg);opacity:.62;transition:.7s}.smoke{position:absolute;inset:auto 15% -22px 15%;height:28px;border-radius:50%;background:radial-gradient(ellipse,rgba(255,242,189,.5),transparent 65%);filter:blur(10px);opacity:.35;animation:breathe 2.6s ease-in-out infinite;z-index:-1}.book-wrap:hover .book-btn{transform:translateY(-4px) scale(1.055);background:radial-gradient(circle at 50% 22%,rgba(255,79,180,.9),rgba(107,35,141,.94) 45%,rgba(8,11,30,.98));box-shadow:inset 0 0 0 1px rgba(255,242,189,.55),0 0 30px rgba(248,217,120,.9),0 0 70px rgba(255,79,180,.58),0 0 110px rgba(119,247,255,.2),0 22px 54px rgba(0,0,0,.66)}.book-wrap:hover .shine{left:120%}.book-wrap:active .book-btn{transform:translateY(1px) scale(.97);box-shadow:inset 0 8px 22px rgba(0,0,0,.6),0 0 22px rgba(248,217,120,.8)}.spark{position:absolute;width:7px;height:7px;border-radius:50%;background:var(--cream);box-shadow:0 0 16px var(--gold);opacity:0;z-index:5}.book-wrap:hover .s1{animation:spark 1.1s infinite .05s}.book-wrap:hover .s2{animation:spark 1.25s infinite .22s}.book-wrap:hover .s3{animation:spark 1s infinite .42s}.book-wrap:hover .s4{animation:spark 1.4s infinite .6s}.s1{left:14%;top:-9px;--x:-38px}.s2{right:18%;bottom:-12px;--x:34px}.s3{left:48%;top:66px;--x:8px}.s4{right:-10px;top:26%;--x:42px}.hero{height:100vh;display:grid;place-items:center;text-align:center;padding:120px 20px 40px}.hero h1{margin:0;font-family:Georgia,serif;font-size:clamp(48px,8vw,118px);line-height:.92;color:var(--cream);text-shadow:0 0 22px rgba(248,217,120,.6),0 0 70px rgba(255,79,180,.18)}.hero p{max-width:720px;margin:24px auto 0;color:rgba(255,255,255,.76);font-size:20px;line-height:1.6}@keyframes stars{to{background-position:130px 90px,210px 150px}}@keyframes orbit{to{transform:rotate(360deg)}}@keyframes breathe{50%{transform:scale(1.3);opacity:.7}}@keyframes spark{0%{opacity:0;transform:translate(0,0) scale(.3)}35%{opacity:1}100%{opacity:0;transform:translate(var(--x),-36px) scale(1.45)}}@media(max-width:700px){.header{padding:14px 16px}.logo{font-size:25px}.book-btn{min-width:132px;height:48px;padding:0 25px;font-size:14px;border-radius:16px}.hero h1{font-size:46px}}
</style>
</head>
<body>
<header class="header"><div class="logo">WildHermes</div><a href="#varaa" class="book-wrap" aria-label="Varaa matka"><span class="spark s1"></span><span class="spark s2"></span><span class="spark s3"></span><span class="spark s4"></span><span class="smoke"></span><span class="book-btn"><span class="shine"></span>Varaa</span></a></header>
<main class="hero"><section><h1>Making your wishes<br>come true</h1><p>Aladdin-henkinen premium booking button: kultainen aura, violetti taikahohto, liikkuva shine, kipinät ja hengittävä savuefekti.</p></section></main>
</body>
</html>
