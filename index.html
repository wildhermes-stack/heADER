<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WildHermes</title>

<style>
body {
  margin:0;
  background: radial-gradient(circle at 50% -10%, #1a2a44, #05070d);
  font-family: Arial;
  color: white;
}

/* HEADER */
.header {
  position: fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
}

/* LOGO */
.logo {
  font-size:28px;
  color: gold;
  font-weight:bold;
  text-shadow:0 0 10px gold;
}

/* VARAA BUTTON */
.book-wrap {
  position:relative;
}

.book-btn {
  position:relative;
  padding:14px 30px;
  border-radius:16px;
  border:2px solid gold;
  color:#fff;
  text-decoration:none;
  letter-spacing:2px;
  text-transform:uppercase;
  background:rgba(0,0,0,0.7);
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 0 10px gold;
}

/* ✨ HOHTO */
.book-btn::before {
  content:"";
  position:absolute;
  width:120%;
  height:100%;
  top:0;
  left:-120%;
  background:linear-gradient(90deg, transparent, white, transparent);
  opacity:0.6;
}

/* 🔥 HOVER EFFECT */
.book-btn:hover {
  background: linear-gradient(45deg, purple, hotpink);
  box-shadow:
    0 0 20px gold,
    0 0 40px hotpink,
    0 0 80px purple;
  transform:translateY(-3px) scale(1.05);
}

.book-btn:hover::before {
  left:120%;
  transition:0.6s;
}

/* 💥 CLICK EFFECT */
.book-btn:active {
  transform:scale(0.95);
  box-shadow:0 0 15px gold inset;
}

/* ✨ SPARKLES */
.spark {
  position:absolute;
  width:6px;
  height:6px;
  background:gold;
  border-radius:50%;
  opacity:0;
}

.book-wrap:hover .spark {
  animation:spark 1s infinite;
}

.spark:nth-child(1){ top:-10px; left:20%; }
.spark:nth-child(2){ bottom:-10px; right:20%; animation-delay:.2s;}
.spark:nth-child(3){ top:50%; left:-10px; animation-delay:.4s;}

@keyframes spark {
  0% {opacity:0; transform:scale(0);}
  50% {opacity:1;}
  100% {opacity:0; transform:translateY(-20px) scale(1.5);}
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1 {
  font-size:60px;
  color:gold;
  text-shadow:0 0 20px gold;
}
</style>

</head>
<body>

<div class="header">
  <div class="logo">WildHermes</div>

  <div class="book-wrap">
    <div class="spark"></div>
    <div class="spark"></div>
    <div class="spark"></div>

    <a href="#" class="book-btn">Varaa</a>
  </div>
</div>

<div class="hero">
  <h1>Making your wishes come true</h1>
</div>

</body>
</html>
